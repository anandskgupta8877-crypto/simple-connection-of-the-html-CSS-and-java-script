
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Greeting Page</title>

    <link rel="stylesheet" href="style.css">
    <script src="greet.js"></script>
    
</head>
<body>

    <h1 id="greeting">Hello</h1>

    <div class="box-container">
        <div class="box" onclick="changeColor(this, 'red')">red</div>
        <div class="box" onclick="changeColor(this, 'blue')">blue</div>
        <div class="box" onclick="changeColor(this, 'green')">green</div>
        <div class="box" onclick="changeColor(this, 'yellow')">yellow</div>
    </div>

    <div class="controls">
        <input type="text" id="nameInput" placeholder="Enter your name">
        <button onclick="greetUser()">Greet </button>
    </div>


</body>
</html>
